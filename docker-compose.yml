services:
  mysql:
    image: mysql:8.0
    environment:
      - MYSQL_ROOT_PASSWORD=${DB_PASSWORD:-1234}
      - MYSQL_DATABASE=${DB_NAME:-finance_db}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${DB_PASSWORD:-1234}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: always

  backend:
    build: .
    environment:
      - SPRING_PROFILES_ACTIVE=local
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_NAME=${DB_NAME:-finance_db}
      - DB_USERNAME=root
      - DB_PASSWORD=${DB_PASSWORD:-1234}
      - JWT_SECRET=${JWT_SECRET:-local-dev-only-secret-key-please-change-in-prod-minimum-256-bits}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - EXIM_API_KEY=${EXIM_API_KEY}
      - ALPHA_VANTAGE_API_KEY=${ALPHA_VANTAGE_API_KEY}
      - STOCK_MOCK_MODE=${STOCK_MOCK_MODE:-true}
      - MAIL_USERNAME=${MAIL_USERNAME}
      - MAIL_PASSWORD=${MAIL_PASSWORD}
      - SIGNAL_MAIL_ENABLED=${SIGNAL_MAIL_ENABLED:-false}
      - SIGNAL_CRON=${SIGNAL_CRON:-0 30 9 * * MON-FRI}
    depends_on:
      mysql:
        condition: service_healthy
    restart: always

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: /api
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: always

volumes:
  mysql_data:
